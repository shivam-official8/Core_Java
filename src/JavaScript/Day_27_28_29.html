<h1 style="text-align: center;">User's Posts</h1>

<table id="posts" border="1">
  <tr><th>
   Post Id
  </th>
  <th>User Id</th>
  <th>Title</th>
  <th>Body</th>
</tr>
</table>
</body>
<!-- <script src="Day_27_DOM.js"></script> -->

<script>

const apiFetch = async () => {
  const res = await fetch("https://jsonplaceholder.typicode.com/posts", {
    method: "GET",
    headers: { "Content-Type": "application/json" },
  });
  const data = await res.json();
  console.log(data);
  
  return data;
};


const displayPosts = async () => {
  
  const posts = await apiFetch(); 

  let ul = document.getElementById("posts");

  for (let i = 0; i < posts.length; i++) {
    // let li = document.createElement("li");
    let tr=document.createElement("tr");
    let tdid = document.createElement("td");
    let tduid = document.createElement("td");
    let tdtitle = document.createElement("td");
    let tdbody = document.createElement("td");
   tdid.innerHTML = posts[i].id;
   tduid.innerHTML = posts[i].userId;
   tdtitle.innerHTML = posts[i].title;
   tdbody.innerHTML = posts[i].body;
   tr.appendChild(tdid);
   tr.appendChild(tduid);
   tr.appendChild(tdtitle);
   tr.appendChild(tdbody);
   ul.appendChild(tr);
        // li.innerHTML = posts[i].title;
    // ul.appendChild(li);
  }
};

displayPosts();



</script>
